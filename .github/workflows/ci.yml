name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer metadata
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint PHP files
        run: find src bin tests -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run regression tests with coverage
        env:
          COVERAGE_MIN: '90'
          COVERAGE_JSON: coverage.json
          COVERAGE_SUMMARY: coverage-summary.md
        run: phpdbg -qrr tests/coverage.php

      - name: Publish coverage summary
        if: always()
        run: |
          if [ -f coverage-summary.md ]; then
            cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-autosemver-coverage
          path: coverage.json
          if-no-files-found: ignore
